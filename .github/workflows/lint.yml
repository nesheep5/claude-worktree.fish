name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  fish-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install fish
        run: |
          sudo apt-get update
          sudo apt-get install -y fish

      - name: Check fish syntax
        # `fish --no-execute` parses each script without running it,
        # failing the build on any syntax error.
        run: |
          set -l failed 0
          for f in (find . -name '*.fish' -not -path './.git/*')
              echo "checking $f"
              fish --no-execute $f; or set failed 1
          end
          exit $failed
        shell: fish {0}
